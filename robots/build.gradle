plugins {
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    // Используем JUnit 4, чтобы импорты в тестах работали
    testImplementation 'junit:junit:4.13.2'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

application {
    mainClass = 'gui.RobotsProgram'
}

tasks.named('test') {
    // Говорим Gradle использовать JUnit 4 вместо Jupiter
    useJUnit()
}